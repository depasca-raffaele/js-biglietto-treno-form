<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto del treno</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <form action="submit" id="ticket-form" class="row">
                <div class="col-6">
                    <label for="distance" class="form-label">KM da percorrere</label>
                    <input id="distance" type="text" class="form-control" required>
                </div>
                <div class="col-6">
                    <label for="age" class="form-label">Scegli range d'età</label>
                    <select id="age" class="form-select">
                        <option value="minorenne">minore di 18 anni</option>
                        <option value="maggiorenne">maggiorenne</option>
                        <option value="over">over 65</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">genera</button>
                </div>

        </form>

        <div id="ticket-card" class="card d-none">
            <div class="card-body">
                <h3>IL TUO BIGLIETTO</h3>
                <p class="card-text">
                    <strong>PREZZO: </strong><span id="ticket-price"></span>
                </p>
            </div>
        </div>
    </div>


    <!--JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="/script.js"></script>
</body>

</html>
